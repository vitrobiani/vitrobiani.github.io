<!DOCTYPE html>
<html>
<head>
  <!--

    Alternatively, build your application passing the --base-href parameter
    specifying the new root path of your web app.

    Fore more details:

  -->

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Omer Attia">

  

  <meta name="robots" content="noindex" />

  <!-- Favicon -->
  <link rel="icon" href="vitruvian.png" sizes="any"/>
  

  <!-- Open Graph & SEO tags -->
  <meta property="og:title" content="Omer Attia" />
  <meta property="og:description" content="content" />
  <meta property="og:image" content="/assets/assets/images/vitruvian.png" /> 
  <meta name="twitter:title" content="Omer Attia" />
  <meta name="twitter:description" content="content" />
  <meta name="twitter:image" content="/assets/assets/images/vitruvian.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <title> Omer Attia </title>
  <meta name="description" content="content" />
    

  <!-- Status Bar color in Safari browser (iOS) and PWA -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f1f4f8">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1d2428">

  <link rel="manifest" href="manifest.json">
</head>
<body>
  
  
  
  
  
  <script>
    // Pageclip submission helper function
    function sendToPageclip(name, email, message) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://send.pageclip.co/NvNkX0bXyI0SKA26Yp7dKM7repUMAzyK/contact-form', true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.setRequestHeader('Accept', 'application/json');

        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              resolve(xhr.responseText);
            } else {
              reject(new Error('HTTP ' + xhr.status + ': ' + xhr.responseText));
            }
          }
        };

        xhr.onerror = function() {
          reject(new Error('Network error'));
        };

        const params = 'name=' + encodeURIComponent(name) +
                       '&email=' + encodeURIComponent(email) +
                       '&message=' + encodeURIComponent(message);
        xhr.send(params);
      });
    }
  </script>
  <script>
    {{flutter_bootstrap_js}}
  </script>
</body>
</html>
